<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermite Path Visualizer — VEX V5</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      padding: 24px 16px;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a18;
        color: #e0dfd8;
      }
    }

    h1 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 16px;
      color: inherit;
    }

    canvas {
      display: block;
      border-radius: 10px;
      border: 0.5px solid rgba(0, 0, 0, 0.12);
      max-width: 100%;
    }

    @media (prefers-color-scheme: dark) {
      canvas {
        border-color: rgba(255, 255, 255, 0.1);
      }
    }

    .layout {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .sidebar {
      flex: 1;
      min-width: 260px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }

    label {
      font-size: 13px;
      color: #5f5e5a;
    }

    @media (prefers-color-scheme: dark) {
      label {
        color: #888780;
      }
    }

    input[type=range] {
      width: 120px;
      accent-color: #185FA5;
    }

    button {
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 6px;
      border: 0.5px solid rgba(0, 0, 0, 0.2);
      background: transparent;
      cursor: pointer;
      color: inherit;
    }

    button:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    @media (prefers-color-scheme: dark) {
      button {
        border-color: rgba(255, 255, 255, 0.15);
      }

      button:hover {
        background: rgba(255, 255, 255, 0.07);
      }
    }

    .wp-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .wp-row {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 13px;
      flex-wrap: wrap;
    }

    .wp-row input[type=number] {
      width: 70px;
      padding: 3px 6px;
      border-radius: 6px;
      border: 0.5px solid rgba(0, 0, 0, 0.2);
      background: transparent;
      color: inherit;
      font-size: 13px;
    }

    @media (prefers-color-scheme: dark) {
      .wp-row input[type=number] {
        border-color: rgba(255, 255, 255, 0.15);
      }
    }

    .lbl {
      color: #888780;
      min-width: 18px;
    }

    .tag {
      font-size: 11px;
      background: rgba(0, 0, 0, 0.06);
      border-radius: 5px;
      padding: 2px 7px;
      color: #5f5e5a;
      min-width: 34px;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      .tag {
        background: rgba(255, 255, 255, 0.08);
        color: #888780;
      }
    }

    .info {
      font-size: 12px;
      color: #888780;
      margin-top: 16px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <h1>Hermite path visualizer — VEX V5 field (cm)</h1>
  <div class="layout">
    <canvas id="c" width="560" height="560"></canvas>
    <div class="sidebar">
      <div class="controls">
        <label>Samples/segment</label>
        <input type="range" min="5" max="200" value="60" step="1" id="sps">
        <span id="sps-out" style="font-size:13px;min-width:28px">60</span>
        <button onclick="addWaypoint()" style="margin-left:auto">+ waypoint</button>
        <button onclick="clearWaypoints()">reset</button>
      </div>
      <div class="wp-list" id="wp-list"></div>
      <p class="info">
        Drag amber dots to move waypoints.<br>
        Drag small dots to adjust tangents.<br>
        Grid lines = 1 tile (60.96 cm). Field = 365.76 × 365.76 cm.
      </p>
    </div>
  </div>

  <script>
    const FIELD_CM = 365.76;
    const PAD = 30;
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const SIZE = 560;
    const DRAW = SIZE - PAD * 2;
    const scale = DRAW / FIELD_CM;

    const isDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

    let waypoints = [
      { x: 30, y: 30, dx: 100, dy: 0 },
      { x: 180, y: 180, dx: 80, dy: 80 },
      { x: 335, y: 90, dx: 100, dy: -60 },
    ];
    let samplesPerSeg = 60;

    function toCanvas(x, y) {
      return [PAD + x * scale, SIZE - PAD - y * scale];
    }

    function h00(t) { return 2 * t * t * t - 3 * t * t + 1; }
    function h10(t) { return t * t * t - 2 * t * t + t; }
    function h01(t) { return -2 * t * t * t + 3 * t * t; }
    function h11(t) { return t * t * t - t * t; }
    function dh00(t) { return 6 * t * t - 6 * t; }
    function dh10(t) { return 3 * t * t - 4 * t + 1; }
    function dh01(t) { return -6 * t * t + 6 * t; }
    function dh11(t) { return 3 * t * t - 2 * t; }

    function sampleSegment(p0, p1, t) {
      const x = h00(t) * p0.x + h10(t) * p0.dx + h01(t) * p1.x + h11(t) * p1.dx;
      const y = h00(t) * p0.y + h10(t) * p0.dy + h01(t) * p1.y + h11(t) * p1.dy;
      const dxdt = dh00(t) * p0.x + dh10(t) * p0.dx + dh01(t) * p1.x + dh11(t) * p1.dx;
      const dydt = dh00(t) * p0.y + dh10(t) * p0.dy + dh01(t) * p1.y + dh11(t) * p1.dy;
      return { x, y, heading: Math.atan2(dydt, dxdt) };
    }

    function generatePath() {
      const path = [];
      for (let i = 0; i < waypoints.length - 1; i++) {
        for (let s = 0; s < samplesPerSeg; s++) {
          path.push(sampleSegment(waypoints[i], waypoints[i + 1], s / samplesPerSeg));
        }
      }
      path.push(sampleSegment(waypoints[waypoints.length - 2], waypoints[waypoints.length - 1], 1.0));
      return path;
    }

    function draw() {
      ctx.clearRect(0, 0, SIZE, SIZE);
      const dark = isDark();
      const gridColor = dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
      const axisColor = dark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
      const textColor = dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)';
      const fieldBg = dark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.02)';

      const [fx0, fy0] = toCanvas(0, 0);
      const [fx1, fy1] = toCanvas(FIELD_CM, FIELD_CM);

      ctx.fillStyle = fieldBg;
      ctx.beginPath();
      ctx.roundRect(Math.min(fx0, fx1), Math.min(fy0, fy1), DRAW, DRAW, 6);
      ctx.fill();

      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 0.5;
      const gridStep = 60.96;
      for (let g = 0; g <= FIELD_CM; g += gridStep) {
        const [cx] = toCanvas(g, 0);
        const [, cy] = toCanvas(0, g);
        ctx.beginPath(); ctx.moveTo(cx, fy1); ctx.lineTo(cx, fy0); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(fx0, cy); ctx.lineTo(fx1, cy); ctx.stroke();
      }

      ctx.strokeStyle = axisColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(fx0, Math.min(fy0, fy1), DRAW, DRAW);

      ctx.fillStyle = textColor;
      ctx.font = '11px system-ui, sans-serif';
      ctx.textAlign = 'center';
      for (let g = 0; g <= FIELD_CM; g += gridStep) {
        const [cx] = toCanvas(g, 0);
        ctx.fillText(Math.round(g) + '', cx, fy0 + 16);
      }
      ctx.textAlign = 'right';
      for (let g = 0; g <= FIELD_CM; g += gridStep) {
        const [, cy] = toCanvas(0, g);
        ctx.fillText(Math.round(g) + '', fx0 - 4, cy + 4);
      }
      ctx.textAlign = 'left';
      ctx.fillText('cm', fx0 - 26, fy1 - 4);

      if (waypoints.length >= 2) {
        const path = generatePath();
        ctx.beginPath();
        const [sx, sy] = toCanvas(path[0].x, path[0].y);
        ctx.moveTo(sx, sy);
        for (let i = 1; i < path.length; i++) {
          const [px, py] = toCanvas(path[i].x, path[i].y);
          ctx.lineTo(px, py);
        }
        ctx.strokeStyle = dark ? '#378ADD' : '#185FA5';
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.stroke();

        const arrowEvery = Math.max(1, Math.floor(path.length / 12));
        for (let i = arrowEvery; i < path.length - 1; i += arrowEvery) {
          const p = path[i];
          const [ax, ay] = toCanvas(p.x, p.y);
          const len = 8;
          ctx.save();
          ctx.translate(ax, ay);
          ctx.rotate(-p.heading);
          ctx.beginPath();
          ctx.moveTo(-len, -len * 0.5);
          ctx.lineTo(0, 0);
          ctx.lineTo(-len, len * 0.5);
          ctx.strokeStyle = dark ? '#378ADD' : '#185FA5';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.restore();
        }
      }

      waypoints.forEach((wp, i) => {
        const [cx, cy] = toCanvas(wp.x, wp.y);
        const tx = toCanvas(wp.x + wp.dx * 0.3, wp.y + wp.dy * 0.3);

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(tx[0], tx[1]);
        ctx.strokeStyle = dark ? 'rgba(239,159,39,0.5)' : 'rgba(186,117,23,0.5)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 3]);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath();
        ctx.arc(cx, cy, 7, 0, Math.PI * 2);
        ctx.fillStyle = dark ? '#EF9F27' : '#BA7517';
        ctx.fill();

        ctx.fillStyle = dark ? '#412402' : '#fff';
        ctx.font = 'bold 9px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(i + 1, cx, cy + 3.5);

        ctx.beginPath();
        ctx.arc(tx[0], tx[1], 3, 0, Math.PI * 2);
        ctx.fillStyle = dark ? 'rgba(239,159,39,0.7)' : 'rgba(186,117,23,0.7)';
        ctx.fill();
      });
    }

    let dragging = null, dragType = null;

    canvas.addEventListener('mousedown', e => {
      const r = canvas.getBoundingClientRect();
      const mx = (e.clientX - r.left) * (SIZE / r.width);
      const my = (e.clientY - r.top) * (SIZE / r.height);
      for (let i = waypoints.length - 1; i >= 0; i--) {
        const [cx, cy] = toCanvas(waypoints[i].x, waypoints[i].y);
        const tx = toCanvas(waypoints[i].x + waypoints[i].dx * 0.3, waypoints[i].y + waypoints[i].dy * 0.3);
        if (Math.hypot(mx - tx[0], my - tx[1]) < 10) { dragging = i; dragType = 'tangent'; return; }
        if (Math.hypot(mx - cx, my - cy) < 12) { dragging = i; dragType = 'pos'; return; }
      }
    });

    canvas.addEventListener('mousemove', e => {
      if (dragging === null) return;
      const r = canvas.getBoundingClientRect();
      const mx = (e.clientX - r.left) * (SIZE / r.width);
      const my = (e.clientY - r.top) * (SIZE / r.height);
      const fx = (mx - PAD) / scale;
      const fy = (SIZE - PAD - my) / scale;
      if (dragType === 'pos') {
        const { dx, dy } = waypoints[dragging];
        waypoints[dragging] = { x: Math.max(0, Math.min(FIELD_CM, fx)), y: Math.max(0, Math.min(FIELD_CM, fy)), dx, dy };
      } else {
        waypoints[dragging].dx = (fx - waypoints[dragging].x) / 0.3;
        waypoints[dragging].dy = (fy - waypoints[dragging].y) / 0.3;
      }
      renderList();
      draw();
    });

    canvas.addEventListener('mouseup', () => { dragging = null; });
    canvas.addEventListener('mouseleave', () => { dragging = null; });

    function renderList() {
      const list = document.getElementById('wp-list');
      list.innerHTML = '';
      waypoints.forEach((wp, i) => {
        const row = document.createElement('div');
        row.className = 'wp-row';
        row.innerHTML = `
      <span class="tag">WP${i + 1}</span>
      <span class="lbl">x</span><input type="number" value="${wp.x.toFixed(1)}" step="1"  onchange="updateWp(${i},'x',this.value)">
      <span class="lbl">y</span><input type="number" value="${wp.y.toFixed(1)}" step="1"  onchange="updateWp(${i},'y',this.value)">
      <span class="lbl">dx</span><input type="number" value="${wp.dx.toFixed(1)}" step="5" onchange="updateWp(${i},'dx',this.value)">
      <span class="lbl">dy</span><input type="number" value="${wp.dy.toFixed(1)}" step="5" onchange="updateWp(${i},'dy',this.value)">
      ${waypoints.length > 2 ? `<button onclick="removeWp(${i})" style="padding:2px 8px;font-size:12px">×</button>` : ''}
    `;
        list.appendChild(row);
      });
    }

    function updateWp(i, field, val) { waypoints[i][field] = parseFloat(val) || 0; draw(); }

    function addWaypoint() {
      const last = waypoints[waypoints.length - 1];
      waypoints.push({ x: Math.min(FIELD_CM, last.x + 60), y: last.y, dx: last.dx, dy: last.dy });
      renderList(); draw();
    }

    function clearWaypoints() {
      waypoints = [
        { x: 30, y: 30, dx: 100, dy: 0 },
        { x: 335, y: 335, dx: 0, dy: 100 },
      ];
      renderList(); draw();
    }

    function removeWp(i) { waypoints.splice(i, 1); renderList(); draw(); }

    document.getElementById('sps').addEventListener('input', function () {
      samplesPerSeg = parseInt(this.value);
      document.getElementById('sps-out').textContent = samplesPerSeg;
      draw();
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', draw);

    renderList();
    draw();
  </script>
</body>

</html>
